    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1e293b; margin-bottom: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .controls select, .controls input { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.95rem; }
        .controls select { flex: 1; }
        .controls input { flex: 2; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .data-table th, .data-table td { border: 1px solid #e2e8f0; padding: 10px 12px; text-align: left; }
        .data-table th { background: #f1f5f9; font-weight: 600; cursor: pointer; user-select: none; }
        .data-table th:hover { background: #e2e8f0; }
        .data-table tr:nth-child(even) { background: #f8fafc; }
        .data-table tr:hover { background: #f1f5f9; }
        .badge-r { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
        .R-P { background: #fef3c7; color: #d97706; }
        .R-D { background: #dcfce7; color: #15803d; }
        .R-C { background: #e0f2fe; color: #0369a1; }
        .R-A { background: #fee2e2; color: #b91c1c; }
    </style>

    <div class="controls">
        <select id="filter-fanta" onchange="filtraDati()">
            <option value="">Tutte le Fantasquadre</option>
        </select>
        <select id="filter-ruolo" onchange="filtraDati()">
            <option value="">Tutti i Ruoli</option>
            <option value="P">Portieri</option>
            <option value="D">Difensori</option>
            <option value="C">Centrocampisti</option>
            <option value="A">Attaccanti</option>
        </select>
        <input type="text" id="search-player" placeholder="Cerca giocatore o squadra di Serie A..." oninput="filtraDati()">
    </div>

    <table class="data-table" id="player-table">
        <thead>

                <th onclick="ordinaTabella(1)">Ruolo</th>
                <th onclick="ordinaTabella(2)">Calciatore</th>
                <th onclick="ordinaTabella(3)">Squadra A</th>
                <th onclick="ordinaTabella(4)">Quotazione Attuale (Qt.A)</th>
            </tr>
        </thead>

    let ordineDirezione = [true, true, true, true, false];

    function inizializzaFiltri() {
        const fantaSet = new Set(giocatori.map(g => g.fanta));
        const selectFanta = document.getElementById('filter-fanta');
        Array.from(fantaSet).sort().forEach(f => {
            let opt = document.createElement('option');
            opt.value = f;
            opt.textContent = f;
            selectFanta.appendChild(opt);
        });
    }

    function renderTabella(lista) {
        const body = document.getElementById('table-body');
        body.innerHTML = lista.map(g => `
            <tr>
                <td><strong>${g.fanta}</strong></td>
                <td><span class="badge-r R-${g.ruolo}">${g.ruolo}</span></td>
                <td>${g.nome}</td>
                <td>${g.serieA}</td>
                <td><strong>${g.qta}</strong></td>
            </tr>
        `).join('');
    }

    function filtraDati() {
        const fantaSel = document.getElementById('filter-fanta').value;
        const ruoloSel = document.getElementById('filter-ruolo').value;
        const searchSel = document.getElementById('search-player').value.toLowerCase();

        const filtrati = giocatori.filter(g => {
            const matchFanta = !fantaSel || g.fanta === fantaSel;
            const matchRuolo = !ruoloSel || g.ruolo === ruoloSel;
            const matchSearch = g.nome.toLowerCase().includes(searchSel) || g.serieA.toLowerCase().includes(searchSel);
            return matchFanta && matchRuolo && matchSearch;
        });

        renderTabella(filtrati);
    }

    function ordinaTabella(colIndex) {
        const fantaSel = document.getElementById('filter-fanta').value;
        const ruoloSel = document.getElementById('filter-ruolo').value;
        const searchSel = document.getElementById('search-player').value.toLowerCase();

        let lista = giocatori.filter(g => {
            const matchFanta = !fantaSel || g.fanta === fantaSel;
            const matchRuolo = !ruoloSel || g.ruolo === ruoloSel;
            return matchFanta && matchRuolo && (g.nome.toLowerCase().includes(searchSel) || g.serieA.toLowerCase().includes(searchSel));
        });

        ordineDirezione[colIndex] = !ordineDirezione[colIndex];
        const dir = ordineDirezione[colIndex] ? 1 : -1;

        lista.sort((a, b) => {
            let valA, valB;
            switch(colIndex) {
                case 0: valA = a.fanta; valB = b.fanta; break;
                case 1: valA = a.ruolo; valB = b.ruolo; break;
                case 2: valA = a.nome; valB = b.nome; break;
                case 3: valA = a.serieA; valB = b.serieA; break;
                case 4: valA = a.qta; valB = b.qta; return (valA - valB) * dir;
            }
            return valA.localeCompare(valB) * dir;
        });

        renderTabella(lista);
    }

    // Avvio iniziale
    inizializzaFiltri();
    // Di default ordiniamo per quotazione decrescente all'apertura
    giocatori.sort((a,b) => b.qta - a.qta);
    renderTabella(giocatori);
